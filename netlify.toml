[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  # esbuild handles ESM (import/export) in Netlify Functions v2
  node_bundler = "esbuild"

[dev]
  # `netlify dev` starts both Vite and the functions runtime.
  # Use this instead of `npm run dev` when working on the Context Collector locally.
  command = "npm run dev"
  targetPort = 5173

# beads-global dashboard — served by function so env vars can be injected
[[redirects]]
  from = "/dashboard"
  to = "/.netlify/functions/dashboard"
  status = 200

# Supabase OTP strips the path from redirect_to server-side. The callback lands
# on /?code= regardless of what emailRedirectTo contains. The `query` field is
# the correct Netlify syntax for matching on query parameters; embedding query
# strings in `from` is silently ignored by Netlify's redirect engine.
[[redirects]]
  from = "/"
  query = {code = ":code"}
  to = "/dashboard?code=:code"
  status = 302
  force = true

# SPA: all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; connect-src 'self' https://*.supabase.co https://accounts.google.com; script-src 'self' 'unsafe-inline' https://esm.sh; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; frame-ancestors 'none'"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Nightly calendar sync — 06:00 UTC daily
[functions."calendar-sync-scheduled"]
  schedule = "0 6 * * *"
