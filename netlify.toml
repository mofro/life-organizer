[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  # esbuild handles ESM (import/export) in Netlify Functions v2
  node_bundler = "esbuild"

[dev]
  # `netlify dev` starts both Vite and the functions runtime.
  # Use this instead of `npm run dev` when working on the Context Collector locally.
  command = "npm run dev"
  targetPort = 5173

# SPA: all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
